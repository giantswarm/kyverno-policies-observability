apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: always-allow-heartbeats-and-all-pipelines-alerts
  labels:
    [[ include "labels.common" . | nindent 4 ]]
spec:
  rules:
    # Rules for new v1alpha2 API (namespace-scoped with matchType enum)
    - name: always-allow-heartbeats-v1alpha2
      match:
        resources:
          kinds:
          - observability.giantswarm.io/v1alpha2/Silence
      mutate:
        patchesJson6902: |-
          - path: "/spec/matchers/-"
            op: add
            value: {"name": "alertname", "value": "Heartbeat", "matchType": "!="}
    - name: always-allow-all-pipelines-v1alpha2
      match:
        resources:
          kinds:
          - observability.giantswarm.io/v1alpha2/Silence
      preconditions:
        # Skip the all_pipelines matcher when the Silence opts out via the
        # silence.application.giantswarm.io/force-all marker (label or annotation) set to "true".
        all:
        - key: "{{ request.object.metadata.annotations.\"silence.application.giantswarm.io/force-all\" || '' }}"
          operator: NotEquals
          value: "true"
        - key: "{{ request.object.metadata.labels.\"silence.application.giantswarm.io/force-all\" || '' }}"
          operator: NotEquals
          value: "true"
      mutate:
        patchesJson6902: |-
          - path: "/spec/matchers/-"
            op: add
            value: {"name": "all_pipelines", "value": "true", "matchType": "!="}
    # Rules for legacy v1alpha1 API (cluster-scoped with boolean fields)
    - name: always-allow-heartbeats-v1alpha1
      match:
        resources:
          kinds:
          - monitoring.giantswarm.io/v1alpha1/Silence
      mutate:
        patchesJson6902: |-
          - path: "/spec/matchers/-"
            op: add
            value: {"name": "alertname", "value": "Heartbeat", "isRegex": false, "isEqual": false}
    - name: always-allow-all-pipelines-v1alpha1
      match:
        resources:
          kinds:
          - monitoring.giantswarm.io/v1alpha1/Silence
      preconditions:
        # Skip the all_pipelines matcher when the Silence opts out via the
        # silence.application.giantswarm.io/force-all marker (label or annotation) set to "true".
        all:
        - key: "{{ request.object.metadata.annotations.\"silence.application.giantswarm.io/force-all\" || '' }}"
          operator: NotEquals
          value: "true"
        - key: "{{ request.object.metadata.labels.\"silence.application.giantswarm.io/force-all\" || '' }}"
          operator: NotEquals
          value: "true"
      mutate:
        patchesJson6902: |-
          - path: "/spec/matchers/-"
            op: add
            value: {"name": "all_pipelines", "value": "true", "isRegex": false, "isEqual": false}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    application.giantswarm.io/team: atlas
    rbac.kyverno.io/aggregate-to-background-controller: "true"
  name: kyverno:gs-o11y:always-allow-heartbeats-and-all-pipelines-alerts
rules:
- apiGroups:
  - observability.giantswarm.io
  resources:
  - silences
  verbs:
  - get
  - list
  - watch
  - update
- apiGroups:
  - monitoring.giantswarm.io
  resources:
  - silences
  verbs:
  - get
  - list
  - watch
  - update
