apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: always-allow-heartbeats-and-all-pipelines-alerts-v1alpha2
spec:
  steps:
  # Verify the policy is ready before running any mutation assertions.
  - name: check-policy-ready
    use:
      template: ../_steps-templates/cluster-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: always-allow-heartbeats-and-all-pipelines-alerts

  # Create a v1alpha2 Silence with a single custom matcher.
  # The policy must append both the Heartbeat and all_pipelines exclusion
  # matchers at admission time (patchesJson6902 op: add on /spec/matchers/-).
  # The initial matcher uses "namespace" as name so that the JMESPath filter
  # assertions below each return exactly one element (no false positives).
  - name: create-silence-v1alpha2
    try:
    - apply:
        resource:
          apiVersion: observability.giantswarm.io/v1alpha2
          kind: Silence
          metadata:
            name: test-silence-v1alpha2
          spec:
            matchers:
            - name: namespace
              value: test
              matchType: "="

  # Assert that both exclusion matchers were injected by the policy.
  # JMESPath filter keys isolate each expected matcher regardless of its
  # position in the array, so the existing "namespace" matcher is ignored.
  - name: assert-heartbeat-and-all-pipelines-matchers-added
    try:
    - assert:
        timeout: 30s
        template: true
        resource:
          apiVersion: observability.giantswarm.io/v1alpha2
          kind: Silence
          metadata:
            name: test-silence-v1alpha2
          spec:
            (matchers[?name=='alertname']):
            - name: alertname
              value: Heartbeat
              matchType: "!="
            (matchers[?name=='all_pipelines']):
            - name: all_pipelines
              value: "true"
              matchType: "!="

  # Idempotency: the policy also runs on UPDATE (e.g. the silence-operator
  # adding its finalizer). Trigger an update by adding a label and assert the
  # injected matchers are NOT duplicated — exactly one of each must remain.
  - name: update-silence-v1alpha2-and-assert-no-duplicate-matchers
    try:
    - patch:
        resource:
          apiVersion: observability.giantswarm.io/v1alpha2
          kind: Silence
          metadata:
            name: test-silence-v1alpha2
            labels:
              trigger-update: "1"
    - assert:
        timeout: 30s
        template: true
        resource:
          apiVersion: observability.giantswarm.io/v1alpha2
          kind: Silence
          metadata:
            name: test-silence-v1alpha2
          spec:
            (length(matchers[?name=='alertname' && value=='Heartbeat'])): 1
            (length(matchers[?name=='all_pipelines'])): 1

  # Opt-out via annotation: when the Silence carries the
  # silence.application.giantswarm.io/force-all=true annotation, the policy
  # must still add the Heartbeat matcher but must NOT add the all_pipelines
  # matcher (precondition skips the all-pipelines rule).
  - name: create-silence-v1alpha2-force-all-annotation
    try:
    - apply:
        resource:
          apiVersion: observability.giantswarm.io/v1alpha2
          kind: Silence
          metadata:
            name: test-silence-v1alpha2-force-all-annotation
            annotations:
              silence.application.giantswarm.io/force-all: "true"
          spec:
            matchers:
            - name: namespace
              value: test
              matchType: "="
  - name: assert-heartbeat-added-and-all-pipelines-skipped-annotation
    try:
    - assert:
        timeout: 30s
        template: true
        resource:
          apiVersion: observability.giantswarm.io/v1alpha2
          kind: Silence
          metadata:
            name: test-silence-v1alpha2-force-all-annotation
          spec:
            (matchers[?name=='alertname']):
            - name: alertname
              value: Heartbeat
              matchType: "!="
            (length(matchers[?name=='all_pipelines'])): 0
